<!-- Local hero SVG: stylized Norwegian church silhouette for offline viewing -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Kirke i Norge">
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A" />
      <stop offset="40%" stop-color="#FED7AA" />
      <stop offset="100%" stop-color="#E0F2FE" />
    </linearGradient>
    <linearGradient id="hills" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#D1FAE5" />
      <stop offset="100%" stop-color="#BBF7D0" />
    </linearGradient>
    <radialGradient id="sun" cx="20%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#FFD166" stop-opacity="1" />
      <stop offset="100%" stop-color="#FFD166" stop-opacity="0" />
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
  </defs>

  <!-- Background sky -->
  <rect width="100%" height="100%" fill="url(#sky)" />

  <!-- Sun glow -->
  <circle cx="420" cy="120" r="200" fill="url(#sun)" filter="url(#soft)" />

  <!-- Distant hills -->
  <path d="M0,520 C220,440 500,480 820,480 C1140,480 1400,420 1700,450 C2000,480 2200,460 2400,520 L2400,800 L0,800 Z" fill="url(#hills)" opacity="0.95" />
  <path d="M0,600 C260,540 640,560 980,560 C1320,560 1580,520 1900,540 C2140,555 2300,540 2400,600 L2400,800 L0,800 Z" fill="#D6FCE6" opacity="0.9" />

  <!-- Church silhouette -->
  <g transform="translate(760,250) scale(1.18)">
    <rect x="160" y="180" width="220" height="160" rx="6" fill="#0B1220" />
    <rect x="220" y="120" width="100" height="60" rx="4" fill="#0B1220" />
    <polygon points="280,40 240,120 320,120" fill="#0B1220" />
    <rect x="194" y="230" width="60" height="110" rx="4" fill="#0B1220" />
    <rect x="266" y="230" width="60" height="110" rx="4" fill="#0B1220" />
    <rect x="220" y="260" width="40" height="40" fill="#F8FAFC" opacity="0.06" />
    <rect x="220" y="308" width="40" height="22" fill="#F8FAFC" opacity="0.04" />

    <!-- Steeple -->
    <polygon points="270, -40 255,40 285,40" fill="#0B1220" />
    <rect x="268" y="-40" width="4" height="-30" fill="#0B1220" />
  </g>

  <!-- Foreground subtle texture -->
  <g fill="#ffffff" opacity="0.06">
    <circle cx="380" cy="700" r="1.8" />
    <circle cx="420" cy="720" r="1.6" />
    <circle cx="460" cy="708" r="1.8" />
    <circle cx="520" cy="690" r="2" />
  </g>

  <!-- Optional credit (hidden, for local use) -->
  <metadata>Local SVG hero for Sørhaug Consulting</metadata>
</svg>